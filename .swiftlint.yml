# SwiftLint Configuration

# Paths to ignore
excluded:
  - .build
  - .sl
  - DerivedData
  - build

# Rules to disable (too pedantic for this project)
disabled_rules:
  - identifier_name
  - trailing_comma
  - implicit_optional_initialization

# Rule configurations
line_length:
  warning: 150
  error: 250
  ignores_comments: true
  ignores_urls: true
  ignores_function_declarations: true

file_length:
  warning: 500
  error: 1000

type_body_length:
  warning: 500
  error: 600

function_body_length:
  warning: 60
  error: 100

# Opt-in rules to enable
opt_in_rules:
  - empty_count
